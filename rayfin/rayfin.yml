id: aidip
name: aidip
version: 1.0.0
services:
  auth:
    enabled: true
    fabric:
      enabled: true
    password:
      enabled: true
    allowedRedirectUris:
      - http://localhost:5173
      - http://localhost:5173/auth/callback
  data:
    enabled: true
    dialect: mssql
  functions:
    enabled: true
    runtime: node
    language: typescript
    entry: rayfin/functions/src/function_app.ts
  storage:
    enabled: true
    containers:
      - aidip-exports
  staticHosting:
    enabled: true
    folder: dist
    buildCommand: npm run build
    indexDocument: index.html
